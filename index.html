<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Umwelttechnik Lernseite</title>
  <style>
    :root{
      --bg:#f3f6fb; --card:#ffffff; --text:#17324d; --muted:#5f7388;
      --primary:#1f5fa8; --primary-dark:#17487f; --accent:#f28c28;
      --line:#d8e2ee; --soft:#edf4fb; --success:#1f8a55; --danger:#c0392b;
      --shadow:0 10px 30px rgba(20,48,79,.08); --radius:22px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#eef4fa 0%,#f8fbfe 100%);color:var(--text)}
    .app{max-width:1150px;margin:0 auto;padding:22px}
    .hero{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-radius:30px;padding:28px;box-shadow:var(--shadow);margin-bottom:24px}
    .hero h1{margin:0 0 10px;font-size:clamp(30px,4vw,48px);line-height:1.05}
    .hero p{margin:0;max-width:850px;line-height:1.6;color:rgba(255,255,255,.92);font-size:16px}
    .view{display:none}.view.active{display:block}
    .topic-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:20px}
    .topic-card,.summary-section,.cards-shell,.game-shell{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;border:1px solid var(--line)}
    .topic-card h2{margin:0 0 10px;font-size:25px;line-height:1.2}
    .topic-card p{margin:0 0 18px;color:var(--muted);line-height:1.6}
    .button-row{display:flex;flex-wrap:wrap;gap:10px}
    button{border:none;border-radius:16px;padding:12px 16px;font-size:15px;cursor:pointer;transition:.18s ease;font-weight:700}
    button.primary{background:var(--primary);color:#fff} button.primary:hover{background:var(--primary-dark)}
    button.secondary{background:#eef4fb;color:var(--text);border:1px solid var(--line)} button.secondary:hover{background:#e4eef9}
    button.accent{background:var(--accent);color:#fff} button.accent:hover{filter:brightness(.96)}
    button.danger{background:#fff1f0;color:var(--danger);border:1px solid #ffd0cb}
    .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:18px;flex-wrap:wrap}
    .topbar h2{margin:0 0 6px;font-size:clamp(26px,3vw,40px);line-height:1.1}
    .topbar p{margin:0;color:var(--muted);line-height:1.6}
    .summary-section{margin-bottom:16px}.summary-section h3{margin:0 0 14px;font-size:22px}.summary-section ul{margin:0;padding-left:22px}.summary-section li{margin:0 0 12px;line-height:1.7}
    .pdf-frame-wrap{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.pdf-frame{width:100%;height:78vh;border:none;background:#fff}
    .progress-row{display:flex;justify-content:space-between;gap:12px;align-items:center;color:var(--muted);font-size:14px;margin-bottom:10px}
    .progress{width:100%;height:10px;border-radius:999px;background:#e7eef7;overflow:hidden;margin-bottom:18px}.progress>div{height:100%;background:linear-gradient(90deg,var(--accent),#f5ad60);width:0;transition:.2s ease}
    .flashcard{min-height:300px;background:linear-gradient(180deg,#f8fbfe,#edf4fb);border:1px solid var(--line);border-radius:28px;padding:28px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;margin-bottom:18px}
    .flashcard small{display:block;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);margin-bottom:16px;font-weight:700}.flashcard .text{font-size:clamp(23px,3vw,33px);line-height:1.35;font-weight:700}.flashcard .hint{margin-top:20px;color:var(--muted);font-size:14px}
    .pill{display:inline-block;padding:8px 12px;border-radius:999px;background:#fff4e8;color:#9a5a11;font-size:13px;font-weight:700;margin-top:10px}
    .footer-note{text-align:center;color:var(--muted);font-size:14px;margin-top:18px}
    .game-info{color:var(--muted);line-height:1.6;margin:0 0 16px}
    .flow-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin:16px 0}
    .slot{background:#f8fbfe;border:2px dashed #bed0e3;border-radius:18px;padding:14px;min-height:92px}
    .slot.correct{border-color:var(--success);background:#eefaf4}.slot.wrong{border-color:var(--danger);background:#fff5f3}
    .slot-number{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em}.slot-value{font-size:18px;font-weight:800;margin-top:8px;min-height:24px}.slot-hint{font-size:13px;color:var(--muted);margin-top:8px}
    select{width:100%;margin-top:10px;padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:white;color:var(--text);font-size:15px}
    .result{font-weight:800;margin-top:14px}.result.ok{color:var(--success)}.result.bad{color:var(--danger)}
    .mini-diagram{background:#f8fbfe;border:1px solid var(--line);border-radius:18px;padding:14px;line-height:1.7;margin:12px 0;color:var(--text)}

    .diagram-card{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}
    .diagram-area{position:relative;width:100%;aspect-ratio:16/7;background:linear-gradient(180deg,#ffffff,#fbfdff);border-bottom:1px solid var(--line)}
    .plant-svg{position:absolute;inset:0;width:100%;height:100%}
    .dropzone{
      position:absolute;transform:translate(-50%,-50%);width:11.5%;min-width:82px;min-height:38px;
      border:2px dashed #2b69d1;border-radius:10px;background:rgba(255,255,255,.92);
      display:flex;align-items:center;justify-content:center;text-align:center;padding:5px;
      font-size:clamp(10px,1.1vw,14px);font-weight:800;color:var(--primary);
      box-shadow:0 4px 12px rgba(31,95,168,.08)
    }
    .dropzone.empty::after{content:"";display:block}
    .dropzone.selected{outline:3px solid rgba(242,140,40,.35)}
    .dropzone.correct{border-color:var(--success);background:#eefaf4;color:var(--success)}
    .dropzone.wrong{border-color:var(--danger);background:#fff5f3;color:var(--danger)}
    .label-bank{padding:18px 20px;background:#fff}
    .label-bank h3{margin:0 0 12px;font-size:18px}
    .term-list{display:flex;flex-wrap:wrap;gap:10px}
    .term-chip{
      user-select:none;background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 15px;
      box-shadow:0 4px 12px rgba(20,48,79,.06);cursor:pointer;font-weight:700;color:var(--text)
    }
    .term-chip:hover{border-color:#8fb1df;background:#f8fbff}
    .term-chip.active{background:#fff4e8;border-color:var(--accent);color:#9a5a11}
    .term-chip.used{opacity:.38}
    .legend{display:flex;flex-wrap:wrap;gap:18px;align-items:center;color:var(--muted);font-size:13px;margin-top:14px}
    .legend span{display:inline-flex;align-items:center;gap:7px}
    .sample-box{width:32px;height:20px;border:2px dashed #2b69d1;border-radius:5px}
    .sample-box.ok{border-color:var(--success);background:#eefaf4}
    .sample-box.bad{border-color:var(--danger);background:#fff5f3}

    @media(max-width:700px){.app{padding:14px}.hero{padding:22px;border-radius:24px}.topic-card,.summary-section,.cards-shell,.game-shell{padding:18px}.flashcard{padding:20px;min-height:260px}.pdf-frame{height:72vh}button{width:100%}.button-row{display:grid;grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app">
  <section class="hero">
    <h1>Umwelttechnik Lernseite</h1>
    <p>Pro Thema: Original-PDF öffnen, Zusammenfassung lesen, Karteikarten lernen. Für den Aufbau der Kläranlage gibt es zusätzlich eine Zuordnungsübung.</p>
  </section>

  <section id="homeView" class="view active">
    <div id="topicGrid" class="topic-grid"></div>
    <div class="footer-note">Alle PDFs müssen im gleichen Ordner wie diese HTML-Datei liegen.</div>
  </section>

  <section id="topicView" class="view">
    <div class="topbar">
      <div>
        <h2 id="topicTitle"></h2>
        <p id="topicSubtitle"></p>
      </div>
      <div class="button-row"><button class="secondary" onclick="goHome()">Zurück zur Startseite</button></div>
    </div>
    <div id="summaryPanel"></div>
    <div id="cardsPanel" style="display:none"></div>
    <div id="pdfPanel" style="display:none"></div>
    <div id="gamePanel" style="display:none"></div>
  </section>
</div>

<script>
const topics = {
  recht: {
    title:"Einführung & juristische Grundlagen",
    pdf:"01_Einfuerhung_und_jur._Grundlagen.pdf",
    teaser:"Hierarchie der Umweltgesetzgebung, Basler Übereinkommen, EU-Rechtsakte, untergesetzliches Regelwerk und Umweltstrafrecht.",
    hasGame:false,
    summary:[
      ["1. Hierarchie der Umweltgesetzgebung",["Die Umweltgesetzgebung ist hierarchisch aufgebaut: Völkerrecht, EU-Recht, Bundesrecht und Landesrecht.","Höherrangiges Recht setzt den Rahmen für nachrangiges Recht.","Klausurrelevant ist die Einordnung, auf welcher Ebene eine Regelung entsteht und wie sie darunter wirkt."]],
      ["2. Völkerrecht – Basler Übereinkommen",["Beispiel für völkerrechtliche Regelungen im Umweltbereich.","Regelt die Kontrolle der grenzüberschreitenden Verbringung gefährlicher Abfälle und deren Entsorgung.","Wichtig als Beispiel für internationales Abfallrecht."]],
      ["3. Rechtsakte der EU",["Verordnung: gilt unmittelbar rechtsverbindlich in allen Mitgliedstaaten.","Richtlinie: muss fristgerecht in nationales Recht umgesetzt werden.","Beschluss: verbindlich für die adressierten Staaten oder Unternehmen.","Empfehlung: keine bindende Wirkung."]],
      ["4. Weitere Rechtsnormen",["Landesrecht darf über Bundesrecht hinausgehen, darf ihm aber nicht widersprechen.","Untergesetzliches Regelwerk konkretisiert Gesetze, z. B. technische Regeln, TA Luft, TA Lärm und GUV-Richtlinien."]],
      ["5. Strafrechtlicher Umweltschutz",["Der 29. Abschnitt des StGB behandelt Straftaten gegen die Umwelt.","Beispiele: Gewässerverunreinigung, Bodenverunreinigung, Luftverunreinigung, unerlaubter Umgang mit Abfällen, unerlaubtes Betreiben von Anlagen und Umgang mit gefährlichen Stoffen."]]
    ],
    cards:[
      ["Wie ist die Hierarchie der Umweltgesetzgebung aufgebaut?","Völkerrecht → EU-Recht → Bundesrecht → Landesrecht."],
      ["Was regelt das Basler Übereinkommen?","Die grenzüberschreitende Verbringung gefährlicher Abfälle und deren Entsorgung."],
      ["Was ist eine EU-Verordnung?","Sie gilt unmittelbar rechtsverbindlich in allen Mitgliedstaaten."],
      ["Was ist eine EU-Richtlinie?","Sie muss fristgerecht in nationales Recht umgesetzt werden."],
      ["Was ist eine EU-Empfehlung?","Sie hat keine bindende Wirkung."],
      ["Was ist untergesetzliches Regelwerk?","Technische und verwaltungsnahe Regelwerke, z. B. TA Luft, TA Lärm und technische Regeln."],
      ["Nenne drei Umweltstraftaten.","Gewässerverunreinigung, Bodenverunreinigung und Luftverunreinigung."]
    ]
  },
  altlasten: {
    title:"Altlastensanierung",
    pdf:"02_Altlastensanierung.pdf",
    teaser:"Sanierungsziele, Sanierungsuntersuchung, Sanierungskonzept, Sanierungsplan, Maßnahmen und Bodenreinigungsverfahren.",
    hasGame:false,
    summary:[
      ["1. Ziele der Sanierung",["Beseitigung oder Verminderung der Schadstoffe durch Dekontaminationsmaßnahmen.","Langfristige Verhinderung oder Verminderung der Ausbreitung durch Sicherungsmaßnahmen.","Beseitigung oder Verminderung schädlicher Veränderungen der Bodenbeschaffenheit."]],
      ["2. Sanierungsuntersuchung",["Ermittelt alle wesentlichen Randbedingungen.","Bildet die Grundlage für das Sanierungskonzept."]],
      ["3. Sanierungskonzept",["Beschreibt Sanierungsziele, Flächen, Teilflächen und Zonen.","Bewertet Eignung der Maßnahmen, Schutz- und Überwachungsmaßnahmen, Zulassungserfordernisse, Kosten und Arbeitsschutz."]],
      ["4. Sanierungsplan",["Planerisch durchgearbeitete Fassung als Grundlage des Genehmigungsverfahrens.","Enthält Gefährdungsabschätzung, Nutzung, Nachsorge und Langzeitüberwachung."]],
      ["5. Maßnahmen und Verfahren",["Verwaltungsmaßnahmen, Sicherungsmaßnahmen, Umlagerung, Dekontamination und Selbstreinigung mit Überwachung.","Verfahren: elektrokinetisch, thermisch, chemisch-physikalisch, Bodenwäsche, Bodenluftabsaugung, Immobilisierung und mikrobiologisch."]]
    ],
    cards:[
      ["Welche drei Zielrichtungen hat die Altlastensanierung?","Dekontamination, Sicherung gegen Ausbreitung und Verminderung schädlicher Bodenveränderungen."],
      ["Was bedeutet Dekontamination?","Schadstoffe werden beseitigt oder vermindert."],
      ["Was ist das Ziel von Sicherungsmaßnahmen?","Die Ausbreitung von Schadstoffen verhindern oder vermindern."],

      ["Wozu dient der Sanierungsplan?","Als konkrete genehmigungsfähige Ausarbeitung des Sanierungskonzepts."],

      ["Was bedeutet in situ?","Behandlung am Ort der Belastung."]

  },
  klaeranlage: {
    title:"Aufbau und Funktion kommunaler Kläranlagen",
    pdf:"Kläranlage.pdf",
    teaser:"Aufbau einer kommunalen Kläranlage mit Vorklärung. Wichtig: Begriffe im Fließschema richtig zuordnen.",
    hasGame:true,
    summary:[
      ["1. Grundidee des Fließschemas",["Das Abwasser fließt vom Zulauf über mechanische und biologische Reinigungsstufen bis zum Ablauf.","Im Schema werden außerdem Schlammströme dargestellt: Primärschlamm, Überschussschlamm und Rücklaufschlamm.","Die Anlage enthält eine Vorklärung, biologische Reinigung im Belebungsbecken und eine Nachklärung."]],
      ["2. Wasserlinie – Reihenfolge",["Zulauf: Eintritt des Abwassers in die Kläranlage.","Regenentlastung: entlastet die Anlage bei starkem Regen bzw. hohen Zuflüssen.","Rechen: entfernt grobe Stoffe aus dem Abwasser.","Sandfang: entfernt mineralische Bestandteile wie Sand.","Vorklärbecken: absetzbare Stoffe sinken ab, Primärschlamm entsteht.","Belebungsbecken mit Belüftung: biologische Reinigung durch Mikroorganismen, Sauerstoff wird eingetragen.","Nachklärbecken: trennt Belebtschlamm vom gereinigten Wasser.","Ablauf: gereinigtes Wasser verlässt die Anlage."]],
      ["3. Schlammstrom",["Primärschlamm aus der Vorklärung und Überschussschlamm aus dem biologischen Prozess werden der Schlammbehandlung zugeführt.","Rücklaufschlamm wird aus der Nachklärung zurück ins Belebungsbecken geführt, damit genügend Mikroorganismen vorhanden sind.","Die Schlammbehandlung besteht im Schema aus Voreindicker, Faulraum, Nacheindicker, Schlammpresse und Schlammentsorgung."]],
      ["4. Prüfungsrelevante Zuordnung",["Du solltest die Begriffe aus dem Bild in der richtigen Reihenfolge der Wasserlinie zuordnen können.","Zusätzlich solltest du erklären können, welche Teile zur Schlammbehandlung gehören und was Rücklaufschlamm bedeutet."]]
    ],
    cards:[
      ["Welche Station kommt direkt nach dem Zulauf?","Die Regenentlastung."],
      ["Welche Aufgabe hat der Rechen?","Er entfernt grobe Stoffe aus dem Abwasser."],
      ["Welche Aufgabe hat der Sandfang?","Er entfernt mineralische Bestandteile wie Sand."],
      ["Welche Funktion hat das Vorklärbecken?","Absetzbare Stoffe sinken ab; Primärschlamm entsteht."],
      ["Wo findet die biologische Reinigung statt?","Im Belebungsbecken."],
      ["Warum wird das Belebungsbecken belüftet?","Damit Mikroorganismen Sauerstoff für den biologischen Abbau erhalten."],
      ["Welche Aufgabe hat das Nachklärbecken?","Es trennt Belebtschlamm vom gereinigten Wasser."],
      ["Was ist Rücklaufschlamm?","Schlamm aus der Nachklärung, der zurück ins Belebungsbecken geführt wird."],
      ["Welche Stationen gehören zur Schlammbehandlung?","Voreindicker, Faulraum, Nacheindicker, Schlammpresse und Schlammentsorgung."],
      ["Wie lautet die Wasserlinie im Schema?","Zulauf → Regenentlastung → Rechen → Sandfang → Vorklärbecken → Belebungsbecken → Nachklärbecken → Ablauf."]
    ],
    gameTerms:["Zulauf","Regenentlastung","Rechen","Sandfang","Vorklärbecken","Belebungsbecken","Belüftung","Nachklärbecken","Ablauf","Rücklaufschlamm","Voreindicker","Faulraum","Nacheindicker","Schlammpresse","Schlammentsorgung"],
    gameSlots:[
      ["Zulauf","Start: Abwasser tritt in die Anlage ein."],
      ["Regenentlastung","Entlastung bei starkem Regen / hohem Zufluss."],
      ["Rechen","Entfernung grober Stoffe."],
      ["Sandfang","Entfernung mineralischer Stoffe wie Sand."],
      ["Vorklärbecken","Absetzbare Stoffe sinken ab; Primärschlamm entsteht."],
      ["Belebungsbecken","Biologische Reinigung durch Mikroorganismen."],
      ["Belüftung","Sauerstoffeintrag im Belebungsbecken."],
      ["Nachklärbecken","Trennung von Belebtschlamm und gereinigtem Wasser."],
      ["Ablauf","Gereinigtes Wasser verlässt die Anlage."],
      ["Rücklaufschlamm","Schlamm wird aus der Nachklärung zurück ins Belebungsbecken geführt."],
      ["Voreindicker","Beginn der Schlammbehandlung."],
      ["Faulraum","Stabilisierung/Faulung des Schlamms."],
      ["Nacheindicker","Weitere Eindickung nach der Faulung."],
      ["Schlammpresse","Mechanische Entwässerung des Schlamms."],
      ["Schlammentsorgung","Ende der Schlammbehandlung."]
    ]
  },
  abwasser: {
    title:"Abwasserreinigung – Inhaltsstoffe",
    pdf:"Abwasserreinigung.pdf",
    teaser:"Zehrstoffe, Nährstoffe und Störstoffe im Abwasser sowie deren Wirkungen auf Gewässer und Reinigungsprozesse.",
    hasGame:false,
    summary:[
      ["1. Zehrstoffe",["Beispiele sind Glucose und Harnsäure.","Zehrstoffe sind biologisch abbaubar.","Ihr Abbau verbraucht Sauerstoff. Dadurch sinkt der Sauerstoffgehalt in Gewässern.","Ein starker Sauerstoffverbrauch kann in Gewässern zu Fischsterben führen.","Anaerobe Abbauprozesse können zu Geruchsbelastungen führen."]],
      ["2. Nährstoffe",["Beispiele sind Stickstoff- und Phosphorverbindungen.","Nährstoffe fördern das Wachstum von Pflanzen und Algen.","Das verstärkte Wachstum wird als Eutrophierung bezeichnet.","Besonders in stehenden Gewässern ist Eutrophierung problematisch; auch im Meer kann sie sich durch verstärktes Algenwachstum bemerkbar machen.","Aus biochemischen Stoffwechselprozessen kann H₂S entstehen: problematisch wegen Geruch, Toxizität und Korrosivität."]],
      ["3. Störstoffe",["Beispiele sind Salze, Fette, Öle, Tone und Sand.","Störstoffe können auf Mikroorganismen toxisch wirken.","Sie können außerdem den Verfahrensablauf der Abwasserreinigung stören."]]
    ],
    cards:[
      ["Was sind Beispiele für Zehrstoffe?","Glucose und Harnsäure."],
      ["Sind Zehrstoffe biologisch abbaubar?","Ja, sie sind biologisch abbaubar."],
      ["Warum sind Zehrstoffe problematisch?","Ihr Abbau verbraucht Sauerstoff und senkt den Sauerstoffgehalt im Gewässer."],
      ["Was kann Sauerstoffmangel im Gewässer verursachen?","Fischsterben."],
      ["Was kann bei anaerobem Abbau entstehen?","Geruchsbelastungen."],
      ["Was sind Beispiele für Nährstoffe?","Stickstoff- und Phosphorverbindungen."],
      ["Was bedeutet Eutrophierung?","Verstärktes Wachstum von Pflanzen und Algen durch Nährstoffeintrag."],
      ["Wo ist Eutrophierung besonders problematisch?","Besonders in stehenden Gewässern; auch im Meer durch verstärktes Algenwachstum."],
      ["Warum ist H₂S problematisch?","Wegen Geruch, Toxizität und Korrosivität."],
      ["Was sind Beispiele für Störstoffe?","Salze, Fette, Öle, Tone und Sand."],
      ["Wie wirken Störstoffe auf Mikroorganismen?","Sie können toxisch wirken."],
      ["Was können Störstoffe in der Kläranlage stören?","Den Verfahrensablauf der Abwasserreinigung."]
    ]
  }
};

let currentTopicKey=null,currentMode="summary",cardIndex=0,showAnswer=false;

function initHome(){
  const grid=document.getElementById("topicGrid");
  grid.innerHTML=Object.keys(topics).map(key=>{
    const t=topics[key];
    return `<article class="topic-card">
      <h2>${t.title}</h2>
      <p>${t.teaser}</p>
      <div class="button-row">
        <button class="primary" onclick="openTopic('${key}','summary')">Zusammenfassung lesen</button>
        <button class="secondary" onclick="openTopic('${key}','cards')">Karteikarten lernen</button>
        ${t.hasGame?`<button class="secondary" onclick="openTopic('${key}','game')">Zuordnung üben</button>`:""}
        <button class="accent" onclick="openTopic('${key}','pdf')">PDF komplett öffnen</button>
      </div>
    </article>`;
  }).join("");
}

function openTopic(topicKey,mode){
  currentTopicKey=topicKey;currentMode=mode;cardIndex=0;showAnswer=false;
  document.getElementById("homeView").classList.remove("active");
  document.getElementById("topicView").classList.add("active");
  document.getElementById("topicTitle").textContent=topics[topicKey].title;
  renderMode();
}

function goHome(){document.getElementById("topicView").classList.remove("active");document.getElementById("homeView").classList.add("active");}

function navButtons(){
  const t=topics[currentTopicKey];
  return `<div class="button-row" style="margin-bottom:16px">
    <button class="${currentMode==='summary'?'primary':'secondary'}" onclick="switchMode('summary')">Zusammenfassung</button>
    <button class="${currentMode==='cards'?'primary':'secondary'}" onclick="switchMode('cards')">Karteikarten</button>
    ${t.hasGame?`<button class="${currentMode==='game'?'primary':'secondary'}" onclick="switchMode('game')">Zuordnung üben</button>`:""}
    <button class="${currentMode==='pdf'?'primary':'accent'}" onclick="switchMode('pdf')">PDF öffnen</button>
  </div>`;
}

function renderMode(){
  const t=topics[currentTopicKey];
  ["summaryPanel","cardsPanel","pdfPanel","gamePanel"].forEach(id=>{document.getElementById(id).style.display="none";});
  if(currentMode==="summary"){
    document.getElementById("topicSubtitle").textContent="Vollständige Lernzusammenfassung zum Lesen.";
    const p=document.getElementById("summaryPanel");p.style.display="block";
    p.innerHTML=navButtons()+t.summary.map(s=>`<div class="summary-section"><h3>${s[0]}</h3><ul>${s[1].map(x=>`<li>${x}</li>`).join("")}</ul></div>`).join("");
  }
  if(currentMode==="cards"){
    document.getElementById("topicSubtitle").textContent="Karteikartenmodus für das aktive Wiederholen.";
    document.getElementById("cardsPanel").style.display="block";renderCardsPanel();
  }
  if(currentMode==="pdf"){
    document.getElementById("topicSubtitle").textContent="Original-PDF direkt öffnen oder in der Seite ansehen.";
    const p=document.getElementById("pdfPanel");p.style.display="block";
    p.innerHTML=navButtons()+`<div class="button-row" style="margin-bottom:16px"><button class="accent" onclick="window.open('${t.pdf}','_blank')">PDF in neuem Tab öffnen</button></div><div class="pdf-frame-wrap"><iframe class="pdf-frame" src="${t.pdf}"></iframe></div>`;
  }
  if(currentMode==="game"){
    document.getElementById("topicSubtitle").textContent="Begriffe aus dem Kläranlagen-Fließschema zuordnen.";
    document.getElementById("gamePanel").style.display="block";renderGamePanel();
  }
}

function switchMode(mode){currentMode=mode;cardIndex=0;showAnswer=false;renderMode();}

function renderCardsPanel(){
  const t=topics[currentTopicKey],total=t.cards.length,progress=((cardIndex+1)/total)*100,pair=t.cards[cardIndex];
  document.getElementById("cardsPanel").innerHTML=navButtons()+`<div class="cards-shell">
    <div class="progress-row"><span>Karte ${cardIndex+1} von ${total}</span><span>${Math.round(progress)}%</span></div>
    <div class="progress"><div style="width:${progress}%"></div></div>
    <div class="flashcard" onclick="flipCard()"><small>${showAnswer?"Antwort":"Frage"}</small><div class="text">${showAnswer?pair[1]:pair[0]}</div><div class="hint">Zum Umdrehen antippen</div></div>
    <div class="button-row"><button class="secondary" onclick="prevCard()">Vorherige Karte</button><button class="primary" onclick="flipCard()">Umdrehen</button><button class="accent" onclick="nextCard()">Nächste Karte</button></div>
    <div class="pill">Alle Karteikarten stammen aus dem jeweiligen PDF-Thema.</div>
  </div>`;
}
function flipCard(){showAnswer=!showAnswer;renderCardsPanel();}
function nextCard(){cardIndex=(cardIndex+1)%topics[currentTopicKey].cards.length;showAnswer=false;renderCardsPanel();}
function prevCard(){cardIndex=(cardIndex-1+topics[currentTopicKey].cards.length)%topics[currentTopicKey].cards.length;showAnswer=false;renderCardsPanel();}

let selectedTerm=null;

function safeId(text){
  return text.replaceAll("ä","ae").replaceAll("ö","oe").replaceAll("ü","ue").replaceAll("ß","ss").replace(/[^a-zA-Z0-9]/g,"_");
}

function selectTerm(term){
  selectedTerm=term;
  document.querySelectorAll(".term-chip").forEach(c=>c.classList.remove("active"));
  const chip=document.getElementById("term-"+safeId(term));
  if(chip && !chip.classList.contains("used")) chip.classList.add("active");
}

function dragTerm(event,term){
  event.dataTransfer.setData("text/plain",term);
}

function dropTerm(event,index){
  event.preventDefault();
  const term=event.dataTransfer.getData("text/plain");
  setDrop(index,term);
}

function placeSelected(index){
  if(!selectedTerm) return;
  setDrop(index,selectedTerm);
  selectedTerm=null;
  document.querySelectorAll(".term-chip").forEach(c=>c.classList.remove("active"));
}

function setDrop(index,term){
  if(!term) return;
  const zone=document.getElementById("drop"+index);

  // Vorherigen Begriff im Feld wieder freigeben
  const old=zone.dataset.value;
  if(old){
    const oldChip=document.getElementById("term-"+safeId(old));
    if(oldChip) oldChip.classList.remove("used");
  }

  // Begriff aus einem anderen Feld entfernen
  document.querySelectorAll(".dropzone").forEach(z=>{
    if(z.dataset.value===term){
      z.dataset.value="";
      z.textContent="";
      z.classList.add("empty");
      z.classList.remove("correct","wrong");
    }
  });

  zone.dataset.value=term;
  zone.textContent=term;
  zone.classList.remove("empty","correct","wrong");

  const chip=document.getElementById("term-"+safeId(term));
  if(chip) chip.classList.add("used");
}

function checkGame(){
  const t=topics[currentTopicKey];let correct=0;
  t.gameSlots.forEach((s,i)=>{
    const zone=document.getElementById("drop"+i);
    zone.classList.remove("correct","wrong");
    if(zone.dataset.value===s[0]){zone.classList.add("correct");correct++;}
    else{zone.classList.add("wrong");}
  });
  const res=document.getElementById("gameResult");
  res.className="result "+(correct===t.gameSlots.length?"ok":"bad");
  res.textContent=`${correct} von ${t.gameSlots.length} richtig.`;
}

function showSolution(){
  const t=topics[currentTopicKey];
  t.gameSlots.forEach((s,i)=>setDrop(i,s[0]));
  document.querySelectorAll(".dropzone").forEach(z=>{z.classList.remove("wrong");z.classList.add("correct");});
  const res=document.getElementById("gameResult");
  res.className="result ok";
  res.textContent="Lösung angezeigt.";
}

function resetGame(){renderGamePanel();}

initHome();
</script>
